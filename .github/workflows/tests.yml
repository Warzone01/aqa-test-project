name: UI tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run pull request smoke tests
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode clean verify -Psmoke -Dheadless=true

      - name: Run full test suite
        if: github.event_name != 'pull_request'
        run: ./mvnw --batch-mode clean verify -Dheadless=true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn
