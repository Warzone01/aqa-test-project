name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run pull request smoke tests
        if: github.event_name == 'pull_request'
        run: ./mvnw --batch-mode clean verify -Psmoke -Dheadless=true

      - name: Run full test suite
        if: github.event_name != 'pull_request'
        run: ./mvnw --batch-mode clean verify -Dheadless=true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: demoqa-api
            profile: demoqa-api
          - name: reqres-api
            profile: reqres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run ${{ matrix.service.name }} tests
        run: ./mvnw --batch-mode clean test -P${{ matrix.service.profile }}

      - name: Upload ${{ matrix.service.name }} Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.service.name }}
          path: target/allure-results
          if-no-files-found: warn
